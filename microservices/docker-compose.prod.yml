version: '3.8'

services:
  # --- INFRASTRUTTURA (Invariata) ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password
    ports:
      - "1433:1433"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  
  carservice:
    image: ghcr.io/k4v4try4/carservice:latest
    container_name: carservice
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CarDb;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True;
      - Kafka__BootstrapServers=kafka:9092 
    depends_on:
      - sqlserver
      - kafka

  employeeservice:
    image: ghcr.io/k4v4try4/employeeservice:latest
    container_name: employeeservice
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EmployeeDb;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True;
      - Kafka__BootstrapServers=kafka:9092 
    depends_on:
      - sqlserver
      - kafka 

  bookingservice:
    image: ghcr.io/k4v4try4/bookingservice:latest
    container_name: bookingservice
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BookingDb;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True;
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - sqlserver
      - kafka