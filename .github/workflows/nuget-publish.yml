name: Publish Shared Libraries

on:
  push:
    branches: [ "main" ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack Specific Projects
        # Usiamo i percorsi relativi partendo dalla cartella 'microservices'
        run: |
          dotnet pack microservices/CarService/CarService.Shared/CarService.Shared.csproj -c Release -o ./artifacts
          dotnet pack microservices/CarService/CarService.ClientHttp/CarService.ClientHttp.csproj -c Release -o ./artifacts
          dotnet pack microservices/EmployeeService/EmployeeService.Shared/EmployeeService.Shared.csproj -c Release -o ./artifacts
          dotnet pack microservices/EmployeeService/EmployeeService.ClientHttp/EmployeeService.ClientHttp.csproj -c Release -o ./artifacts

      - name: Push to GitHub Packages
        # Questo comando prende tutto quello che abbiamo appena creato nella cartella 'artifacts'
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "github" --skip-duplicate