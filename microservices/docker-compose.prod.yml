version: '3.8'

networks:
  fleet-network:
    driver: bridge

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    networks:
      - fleet-network
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password
    ports:
      - "1433:1433"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    networks:
      - fleet-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    networks:
      - fleet-network
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  car-service:
    image: ghcr.io/k4v4try4/carservice:latest
    container_name: car-service
    networks:
      - fleet-network
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CarDb;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True;
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  employee-service:
    image: ghcr.io/k4v4try4/employeeservice:latest
    container_name: employee-service
    networks:
      - fleet-network
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EmployeeDb;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True;
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  booking-service:
    image: ghcr.io/k4v4try4/bookingservice:latest
    container_name: booking-service
    networks:
      - fleet-network
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BookingDb;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True;
      - Kafka__BootstrapServers=kafka:9092

      - ExternalServices__CarServiceUrl=http://car-service:8080
      - ExternalServices__EmployeeServiceUrl=http://employee-service:8080

    depends_on:
      kafka:
        condition: service_healthy
      car-service:
        condition: service_started
      employee-service:
        condition: service_started