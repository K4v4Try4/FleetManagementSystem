name: Docker Publish Multi-Service (No Matrix)

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- CAR SERVICE ---
      - name: Build and push Car Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./microservices/CarService/CarService.WebApi/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/car-service:latest

      # --- EMPLOYEE SERVICE ---
      - name: Build and push Employee Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./microservices/EmployeeService/EmployeeService.WebApi/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/employee-service:latest

      # --- BOOKING SERVICE ---
      - name: Build and push Booking Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./microservices/BookingService/BookingService.WebApi/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/booking-service:latest