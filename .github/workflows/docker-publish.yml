name: Docker Publish Multi-Service

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      # Qui elenchi i nomi delle tue cartelle che contengono un Dockerfile
      matrix:
        service: [microservices/CarService/CarService.WebApi, microservices/EmployeeService/EmployeeService.WebApi]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Questo creerà immagini separate: nome-repo/car, nome-repo/employee, ecc.
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Punta dinamicamente al Dockerfile nella cartella del servizio
          file: ./${{ matrix.service }}/Dockerfile 
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}