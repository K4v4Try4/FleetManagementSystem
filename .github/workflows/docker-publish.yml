name: Publish Shared Libraries

on:
  push:
    branches: [ "main" ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Allineato ai tuoi Dockerfile (usa 10.0.x se i tuoi csproj sono net10.0)
          dotnet-version: '10.0.x' 

      # Fondamentale: ripristina le dipendenze prima di impacchettare
      - name: Restore dependencies
        run: dotnet restore microservices/CarService/CarService.slnx

      - name: Pack Projects
        run: |
          # Car Service - Percorsi completi dalla root del repository
          dotnet pack microservices/CarService/CarService.Shared/CarService.Shared.csproj -c Release -o ./nuget-packages
          dotnet pack microservices/CarService/CarService.ClientHttp/CarService.ClientHttp.csproj -c Release -o ./nuget-packages
          
          # Employee Service
          dotnet pack microservices/EmployeeService/EmployeeService.Shared/EmployeeService.Shared.csproj -c Release -o ./nuget-packages
          dotnet pack microservices/EmployeeService/EmployeeService.ClientHttp/EmployeeService.ClientHttp.csproj -c Release -o ./nuget-packages

      - name: Push to GitHub Packages
        # Assicurati che nel file nuget.config ci sia l'URL di GitHub Packages
        run: dotnet nuget push "./nuget-packages/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "github" --skip-duplicate